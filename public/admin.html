<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - FCMF</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
</head>

<body class="dashboard-body">
    <div class="neural-background"></div>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <a href="#" class="header-logo">
                    <img class="avatar" src="LogoUG FCMF.jpeg" alt="FCMF">
                </a>
                <button class="sidebar-toggler toggler" id="sidebarToggler">
                    <span class="material-symbols-rounded">chevron_left</span>
                </button>
                <button class="menu-toggler toggler" id="menuToggler">
                    <span class="material-symbols-rounded">menu</span>
                </button>
            </header>

            <nav class="sidebar-nav">
                <ul class="nav-list primary-nav">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">
                            <span class="nav-icon material-symbols-rounded">confirmation_number</span>
                            <span class="nav-label">Tickets</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <span class="nav-icon material-symbols-rounded">history</span>
                            <span class="nav-label">Historial</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <span class="nav-icon material-symbols-rounded">storage</span>
                            <span class="nav-label">Base de Datos</span>
                        </a>
                    </li>
                </ul>

                <ul class="nav-list secondary-nav">
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <span class="nav-icon material-symbols-rounded">account_circle</span>
                            <span class="nav-label">Perfil</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" id="logoutBtn">
                            <span class="nav-icon material-symbols-rounded">logout</span>
                            <span class="nav-label">Cerrar Sesión</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div id="mainContent">
                <!-- El contenido se carga dinámicamente desde admin.js -->
                <div class="loading">
                    <p>Cargando panel de administrador...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
