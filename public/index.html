<!DOCTYPE html>
<html lang="en">

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte FCMF</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- ⚡ VERIFICACIÓN DE SESIÓN - Debe ir PRIMERO ⚡ -->
    <script>
        // Redirigir si ya hay una sesión activa
        (function verificarSesionActiva() {
            const usuario = localStorage.getItem("usuario");
            const tipo = localStorage.getItem("tipo");
            
            if (usuario && tipo) {
                console.log("Sesión activa detectada, redirigiendo a:", tipo);
                
                const rutas = {
                    admin: "admin.html",
                    pasante: "pasante.html",
                    usuario: "usuario.html"
                };
                
                const rutaDestino = rutas[tipo];
                if (rutaDestino) {
                    window.location.href = rutaDestino;
                }
            }
        })();
    </script>
</head>

<body>
    <div class="neural-background">
        <div class="neural-node"></div>
        <div class="neural-node"></div>
        <div class="neural-node"></div>
        <div class="neural-node"></div>
        <div class="neural-node"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="ai-glow"></div>

            <div class="login-header">
                <div class="ai-logo">
                    <div class="logo-core">
                        <img src="LogoUG FCMF.jpeg" alt="Logo FCMF" class="fcmf-logo-img">
                    </div>
                    <div class="logo-rings">
                        <div class="ring ring-1"></div>
                        <div class="ring ring-2"></div>
                        <div class="ring ring-3"></div>
                    </div>
                </div>
                <h1>Soporte FCMF</h1>
                <p>Solucionamos incidentes TI</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="smart-field" data-field="email">
                    <div class="field-background"></div>
                    <input type="email" id="email" name="email" required autocomplete="email">
                    <label for="email">Email Institucional</label>
                    <div class="ai-indicator">
                        <div class="ai-pulse"></div>
                    </div>
                    <div class="field-completion"></div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="smart-field" data-field="password">
                    <div class="field-background"></div>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <label for="password">Contraseña</label>
                    <button type="button" class="smart-toggle" id="passwordToggle"
                        aria-label="Toggle password visibility">
                        <svg class="toggle-show" width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path
                                d="M9 3.75c-3.15 0-5.85 1.89-7.02 4.72a.75.75 0 000 .56c1.17 2.83 3.87 4.72 7.02 4.72s5.85-1.89 7.02-4.72a.75.75 0 000-.56C14.85 5.64 12.15 3.75 9 3.75zM9 12a3 3 0 110-6 3 3 0 010 6z"
                                fill="currentColor" />
                        </svg>
                        <svg class="toggle-hide" width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path
                                d="M3.53 2.47a.75.75 0 00-1.06 1.06l11 11a.75.75 0 101.06-1.06l-2.82-2.82c.8-.67 1.5-1.49 2.04-2.42a.75.75 0 000-.56C12.58 4.84 10.89 3.75 9 3.75c-.69 0-1.36.1-2 .29L3.53 2.47zM7.974 5.847L10.126 8a1.5 1.5 0 01-2.126-2.126l-.026-.027z"
                                fill="currentColor" />
                        </svg>
                    </button>
                    <div class="ai-indicator">
                        <div class="ai-pulse"></div>
                    </div>
                    <div class="field-completion"></div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="smart-checkbox">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-ai">
                            <div class="checkbox-core"></div>
                            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                                <path d="M1 5l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </span>
                        <span class="checkbox-text">Recordar esta sesión</span>
                    </label>
                    <a href="#" class="neural-link">Restablecer acceso</a>
                </div>

                <button type="submit" class="neural-button">
                    <div class="button-bg"></div>
                    <span class="button-text">Iniciar sesión</span>
                    <div class="button-loader">
                        <div class="neural-spinner">
                            <div class="spinner-segment"></div>
                            <div class="spinner-segment"></div>
                            <div class="spinner-segment"></div>
                        </div>
                    </div>
                    <div class="button-glow"></div>
                </button>
            </form>

            <div class="auth-separator">
                <div class="separator-line"></div>
                <span class="separator-text">CONTACTO</span>
                <div class="separator-line"></div>
            </div>

            <div class="admin-contact-card">
                <p>Ingeniero Dpto. Sopote:</p>
                <a href="https://outlook.cloud.microsoft/mail/deeplink/compose?to=bruce.navarrog@ug.edu.ec"
                    class="admin-email" target="_blank" rel="noopener noreferrer">
                    bruce.navarrog@ug.edu.ec
                </a>
            </div>

            <p style="text-align: center; color: #475569; font-size: 11px; margin-top: 20px;">
                © 2026 Lara. Lainez.
                Todos los derechos reservados.
            </p>

            
        </div>
    </div>

    <script src="../../shared/js/form-utils.js"></script>
    <script src="script.js"></script>
</body>

</html>
